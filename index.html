    const dateInput = document.getElementById('dateInput');
    const yearlyText = document.getElementById('yearlyText');
    const dailyText = document.getElementById('dailyText');
    const templateText = document.getElementById('templateText');
    const suIframe = document.getElementById('suIframe');
    const externalLink = document.getElementById('externalLink');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const copyBtn = document.getElementById('copyBtn');
    const copyIcon = document.getElementById('copyIcon');
    const copyTextLabel = document.getElementById('copyText');

    // 현재 날짜 상태
    let currentDate = getTodayString();

    // 오늘 날짜 YYYY-MM-DD
    function getTodayString() {
      const today = new Date();
      const offset = today.getTimezoneOffset() * 60000;
      return (new Date(today - offset)).toISOString().split('T')[0];
    }

    // 포맷팅된 요일/날짜 (묵상 노트용)
    function getFormattedDate(dateStr) {
      const dateObj = new Date(dateStr);
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      const dayOfWeek = days[dateObj.getDay()];
      return `${year}년 ${month}월 ${day}일 ${dayOfWeek}요일`;
    }

    // 날짜별 데이터 찾기
    function getBibleData(dateString) {
      const dateObj = new Date(dateString);
      const month = dateObj.getMonth() + 1;
      const day = dateObj.getDate();

      const dText = rawDaily[month] && rawDaily[month][day - 1] ? rawDaily[month][day - 1] : "데이터 없음";
      const yText = rawYearly[month] && rawYearly[month][day - 1] ? rawYearly[month][day - 1] : "데이터 없음";

      return { daily: dText, yearly: yText };
    }

    // UI 업데이트 함수
    function updateUI() {
      dateInput.value = currentDate;
      
      const data = getBibleData(currentDate);
      yearlyText.innerText = data.yearly;
      dailyText.innerText = data.daily;

      // 묵상 노트 템플릿 생성
      const template = `[${getFormattedDate(currentDate)}]
▲통독: ${data.yearly}
●묵상본문 [${data.daily} ]
▲묵상제목[   ]
■묵상과 기도

🙏

●온 세상 주님의 학교`;
      templateText.value = template;

      // 성서유니온 링크 업데이트
      const suUrl = `https://sum.su.or.kr:8888/bible/today?base_de=${currentDate}`;
      externalLink.href = suUrl;
      suIframe.src = suUrl;
    }

    // 날짜 변경 이벤트
    dateInput.addEventListener('change', (e) => {
      currentDate = e.target.value;
      updateUI();
    });

    // 화살표 버튼 이벤트
    function changeDate(days) {
      const dateObj = new Date(currentDate);
      dateObj.setDate(dateObj.getDate() + days);
      currentDate = dateObj.toISOString().split('T')[0];
      updateUI();
    }

    prevBtn.addEventListener('click', () => changeDate(-1));
    nextBtn.addEventListener('click', () => changeDate(1));

    // 묵상 노트 복사 이벤트
    copyBtn.addEventListener('click', () => {
      templateText.select();
      document.execCommand('copy');
      
      copyIcon.className = 'fa-solid fa-check';
      copyTextLabel.innerText = '복사 완료!';
      
      setTimeout(() => {
        copyIcon.className = 'fa-regular fa-copy';
        copyTextLabel.innerText = '양식 복사하기';
      }, 2000);
    });

    // 초기 화면 렌더링
    updateUI();
